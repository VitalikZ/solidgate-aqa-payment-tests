name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: Browser to run
        required: false
        default: chrome
        type: choice
        options: [chrome, firefox, edge]
      headless:
        description: Run headless
        required: false
        default: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Chrome
        if: ${{ github.event.inputs.browser == 'chrome' || github.event.inputs.browser == '' }}
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Firefox
        if: ${{ github.event.inputs.browser == 'firefox' }}
        uses: browser-actions/setup-firefox@v1

      - name: Run tests
        env:
          SOLIDGATE_MERCHANT_ID: ${{ secrets.SOLIDGATE_MERCHANT_ID }}
          SOLIDGATE_SECRET_KEY: ${{ secrets.SOLIDGATE_SECRET_KEY }}
        run: |
          ./gradlew test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }} \
            --no-daemon --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
            build/selenide-reports
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results
          retention-days: 14

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.12
        with:
          allure_results: build/allure-results
          allure_report: build/allure-report
          gh_pages: gh-pages
          allure_history: allure-history
